<h1>Graphic Design</h1>

<div class="gallery">
    <img src="img/graph-1.jpg" onclick="openImage(0)">
    <img src="img/graph-2.jpg" onclick="openImage(1)">
    <img src="img/graph-3.jpg" onclick="openImage(2)">
    <img src="img/graph-4.jpg" onclick="openImage(3)">
    <img src="img/graph-5.jpg" onclick="openImage(4)">
    <img src="img/graph-6.jpg" onclick="openImage(5)">
    <img src="img/graph-7.jpg" onclick="openImage(6)">
    <img src="img/graph-8.jpg" onclick="openImage(7)">
</div>

<div class="lightbox" id="lightbox">

    <span class="close" onclick="closeImage()">&times;</span>

    <span class="prev" onclick="prevImage()">❮</span>

    <img id="lightbox-img">

    <span class="next" onclick="nextImage()">❯</span>

</div>

<script>

const images = [
    "img/graph-1.jpg",
    "img/graph-2.jpg",
    "img/graph-3.jpg",
    "img/graph-4.jpg",
    "img/graph-5.jpg",
    "img/graph-6.jpg",
    "img/graph-7.jpg",
    "img/graph-8.jpg"
];

let currentIndex = 0;

function openImage(index){
    currentIndex = index;
    document.getElementById("lightbox").style.display="flex";
    document.getElementById("lightbox-img").src=images[index];
}

function closeImage(){
    document.getElementById("lightbox").style.display="none";
}

function nextImage(){
    currentIndex++;
    if(currentIndex >= images.length){
        currentIndex = 0;
    }
    document.getElementById("lightbox-img").src=images[currentIndex];
}

function prevImage(){
    currentIndex--;
    if(currentIndex < 0){
        currentIndex = images.length - 1;
    }
    document.getElementById("lightbox-img").src=images[currentIndex];
}

document.addEventListener("keydown",function(e){

    if(e.key==="ArrowRight"){
        nextImage();
    }

    if(e.key==="ArrowLeft"){
        prevImage();
    }

    if(e.key==="Escape"){
        closeImage();
    }

});

</script>

</body>
