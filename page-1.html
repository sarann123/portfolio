<div class="lightbox" id="lightbox">

    <span class="close" onclick="closeImage()">&times;</span>

    <span class="prev" onclick="prevImage()">❮</span>

    <img id="lightbox-img">

    <span class="next" onclick="nextImage()">❯</span>

</div>

<script>

const images = [
    "img/graphic-design/Banner_1.jpg",
    "img/graphic-design/Banner_2.png",
    "img/graphic-design/Banner_3.jpg",
    "img/graphic-design/Banner_4.jpg",
    "img/graphic-design/Banner_5.jpg",
    "img/graphic-design/Banner_6.jpg",
    "img/graphic-design/Banner_7.jpg",
    "img/graphic-design/Banner_8.jpg",
    "img/graphic-design/Banner_9.jpg",
    "img/graphic-design/Banner_10.jpg",
    "img/graphic-design/Banner_11.jpg"
];

let currentIndex = 0;

function openImage(index){
    currentIndex = index;
    document.getElementById("lightbox").style.display="flex";
    document.getElementById("lightbox-img").src=images[index];
}

function closeImage(){
    document.getElementById("lightbox").style.display="none";
}

function nextImage(){
    currentIndex++;
    if(currentIndex >= images.length){
        currentIndex = 0;
    }
    document.getElementById("lightbox-img").src=images[currentIndex];
}

function prevImage(){
    currentIndex--;
    if(currentIndex < 0){
        currentIndex = images.length - 1;
    }
    document.getElementById("lightbox-img").src=images[currentIndex];
}

document.addEventListener("keydown",function(e){

    if(e.key==="ArrowRight"){
        nextImage();
    }

    if(e.key==="ArrowLeft"){
        prevImage();
    }

    if(e.key==="Escape"){
        closeImage();
    }

});

const sections = document.querySelectorAll('.animate-section');

const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('show');
        }
    });
}, {
    threshold: 0.2
});

sections.forEach(section => {
    observer.observe(section);
});
const buttons=document.querySelectorAll(".portfolio-menu button");

const items=document.querySelectorAll(".item");

buttons.forEach(button=>{

button.addEventListener("click",()=>{

buttons.forEach(btn=>btn.classList.remove("active"));

button.classList.add("active");

const filter=button.dataset.filter;

items.forEach(item=>{

if(filter==="all"){

item.style.display="block";

setTimeout(()=>{
item.style.opacity="1";
},50);

}

else if(item.classList.contains(filter)){

item.style.display="block";

setTimeout(()=>{
item.style.opacity="1";
},50);

}

else{

item.style.opacity="0";

setTimeout(()=>{
item.style.display="none";
},300);

}

});

});

});
</script>
